<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>寵物美容服務定型化契約</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap');

    :root{
      --bg:#F5F0E8;
      --card:#FFFDF9;
      --border:#D9C8B5;
      --text:#3F342C;
      --muted:#857469;
      --latte:#8B735F;
      --danger:#9E5E4A;
      --soft:#F2EAE1;
      --soft-2:#EFE5DA;
      --radius:20px;
      --radius-sm:14px;
      --shadow:0 10px 28px rgba(73, 58, 46, .08);
    }

    *{ box-sizing:border-box; }
    html,body{ margin:0; padding:0; }
    body{
      background:var(--bg);
      color:var(--text);
      font-family:"Noto Sans TC", sans-serif;
      line-height:1.6;
    }

    .wrap{
      width:min(900px, calc(100% - 28px));
      margin:24px auto 48px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:22px;
      margin-bottom:18px;
    }

    h1{
      font-size:28px;
      margin:0 0 8px;
      font-weight:800;
    }

    .sub{
      color:var(--muted);
      font-size:14px;
      margin-bottom:18px;
    }

    .sectionTitle{
      font-size:18px;
      font-weight:800;
      margin:0 0 14px;
      padding:10px 14px;
      border-radius:14px;
      background:var(--soft);
    }

    .grid{
      display:grid;
      gap:14px;
    }
    .grid-2{ grid-template-columns:repeat(2, minmax(0,1fr)); }
    .grid-3{ grid-template-columns:repeat(3, minmax(0,1fr)); }

    @media (max-width: 760px){
      .grid-2,.grid-3{ grid-template-columns:1fr; }
    }

    .field label{
      display:block;
      font-size:14px;
      font-weight:700;
      margin-bottom:6px;
    }

    input[type="text"],
    input[type="tel"],
    input[type="email"],
    textarea{
      width:100%;
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px 14px;
      font-size:15px;
      background:#fff;
      color:var(--text);
      outline:none;
    }

    textarea{
      min-height:96px;
      resize:vertical;
    }

    .radioRow,
    .checkRow{
      display:flex;
      flex-wrap:wrap;
      gap:12px 18px;
      padding-top:4px;
    }

    .radioRow label,
    .checkRow label{
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-weight:500;
      margin:0;
    }

    .hidden{ display:none !important; }

    .inlineNote{
      color:var(--muted);
      font-size:13px;
      margin-top:6px;
    }

    .amountWrap,
    .otherInputWrap,
    .bodyCheckDetail{
      display:none;
      margin-top:8px;
    }

    .boxLine{
      border:1px dashed var(--border);
      border-radius:14px;
      padding:14px;
      margin-top:10px;
      background:#fff;
    }

    .bodyCheckItem{
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px;
      background:#fff;
    }

    .sigWrap{
      border:1px solid var(--border);
      border-radius:16px;
      overflow:hidden;
      background:#fff;
    }

    #sig{
      width:100%;
      height:240px;
      display:block;
      background:#fff;
      touch-action:none;
    }

    .sigTools{
      display:flex;
      gap:10px;
      padding:12px;
      border-top:1px solid var(--border);
      background:var(--soft);
    }

    button{
      appearance:none;
      border:none;
      border-radius:999px;
      padding:12px 18px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
    }

    .btn{
      background:var(--latte);
      color:#fff;
    }

    .btnGhost{
      background:#fff;
      color:var(--text);
      border:1px solid var(--border);
    }

    #submit{
      width:100%;
      padding:15px 18px;
      font-size:16px;
      margin-top:8px;
    }

    #msg{
      margin-top:12px;
      white-space:pre-line;
      font-weight:700;
    }

    .agreeRow{
      display:flex;
      align-items:flex-start;
      gap:10px;
      margin-top:12px;
    }

    #contractText{
      white-space:pre-wrap;
      font-size:14px;
      color:var(--text);
      background:#fff;
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px;
      max-height:320px;
      overflow:auto;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>寵物美容服務定型化契約</h1>
      <div class="sub">請填寫下列資料並完成簽名送出。</div>
    </div>

    <div class="card">
      <div class="sectionTitle">甲方基本資料</div>
      <div class="grid grid-2">
        <div class="field">
          <label for="ownerName">甲方姓名</label>
          <input id="ownerName" type="text" />
        </div>
        <div class="field">
          <label for="ownerIdNo">身分證字號</label>
          <input id="ownerIdNo" type="text" />
        </div>
        <div class="field">
          <label for="ownerPhone">聯絡電話</label>
          <input id="ownerPhone" type="tel" />
        </div>
        <div class="field">
          <label for="ownerEmail">Email（寄送附本用）</label>
          <input id="ownerEmail" type="email" />
        </div>
      </div>

      <div class="field" style="margin-top:14px;">
        <label for="ownerAddress">通訊地址</label>
        <input id="ownerAddress" type="text" />
      </div>

      <div class="grid grid-3" style="margin-top:14px;">
        <div class="field">
          <label for="emergencyName">緊急聯絡人</label>
          <input id="emergencyName" type="text" />
        </div>
        <div class="field">
          <label for="emergencyPhone">緊急聯絡人電話</label>
          <input id="emergencyPhone" type="tel" />
        </div>
        <div class="field">
          <label>是否飼主本人</label>
          <div class="radioRow">
            <label><input type="radio" name="isOwnerSelf" value="是" checked />是</label>
            <label><input type="radio" name="isOwnerSelf" value="否" />否</label>
          </div>
        </div>
      </div>

      <div id="ownerRelationWrap" class="field hidden" style="margin-top:14px;">
        <label for="ownerRelation">與飼主關係</label>
        <input id="ownerRelation" type="text" />
      </div>
    </div>

    <div class="card">
      <div class="sectionTitle">毛孩資料</div>

      <div class="grid grid-3">
        <div class="field">
          <label for="petName">寵物姓名</label>
          <input id="petName" type="text" />
        </div>
        <div class="field">
          <label for="petBreed">寵物品種</label>
          <input id="petBreed" type="text" />
        </div>
        <div class="field">
          <label for="petAge">寵物年齡</label>
          <input id="petAge" type="text" />
        </div>
      </div>

      <div class="grid grid-3" style="margin-top:14px;">
        <div class="field">
          <label>性別</label>
          <div class="radioRow">
            <label><input type="radio" name="petSex" value="男生" checked />男生</label>
            <label><input type="radio" name="petSex" value="女生" />女生</label>
          </div>
        </div>
        <div class="field">
          <label>種類</label>
          <div class="radioRow">
            <label><input type="radio" name="petType" value="犬" checked />犬</label>
            <label><input type="radio" name="petType" value="貓" />貓</label>
          </div>
        </div>
        <div class="field">
          <label for="petWeight">體重（公斤）</label>
          <input id="petWeight" type="text" />
        </div>
      </div>

      <div class="grid grid-3" style="margin-top:14px;">
        <div class="field">
          <label for="petBirthday">寵物生日</label>
          <input id="petBirthday" class="js-date" type="text" placeholder="YYYY/MM/DD" />
        </div>
        <div class="field">
          <label>是否有晶片</label>
          <div class="radioRow">
            <label><input type="radio" name="chipHas" value="有" checked />有</label>
            <label><input type="radio" name="chipHas" value="無" />無</label>
          </div>
        </div>
        <div id="chipNoWrap" class="field">
          <label for="chipNo">晶片號碼</label>
          <input id="chipNo" type="text" />
        </div>
      </div>

      <div class="field" style="margin-top:14px;">
        <label>是否絕育</label>
        <div class="radioRow">
          <label><input type="radio" name="neuterStatus" value="已絕育" checked />已絕育</label>
          <label><input type="radio" name="neuterStatus" value="未絕育" />未絕育</label>
        </div>
      </div>

      <div class="field" style="margin-top:14px;">
        <label>寵物個性</label>
        <div class="checkRow">
          <label><input type="checkbox" class="pt" value="活潑" />活潑</label>
          <label><input type="checkbox" class="pt" value="親人" />親人</label>
          <label><input type="checkbox" class="pt" value="害羞" />害羞</label>
          <label><input type="checkbox" class="pt" value="怕生" />怕生</label>
          <label><input type="checkbox" class="pt" value="易緊張" />易緊張</label>
          <label><input type="checkbox" class="pt" value="會咬人" />會咬人</label>
        </div>
      </div>

      <div class="field" style="margin-top:14px;">
        <label for="petTemperamentNote">個性其他應注意</label>
        <textarea id="petTemperamentNote"></textarea>
      </div>
    </div>

    <div class="card">
      <div class="sectionTitle">病史與身體狀況</div>

      <div class="field">
        <label>病史</label>
        <div class="checkRow">
          <label><input id="mh_none" type="checkbox" value="無" />無</label>
          <label><input class="mh" type="checkbox" value="心臟病" />心臟病</label>
          <label><input class="mh" type="checkbox" value="癲癇" />癲癇</label>
          <label><input class="mh" type="checkbox" value="氣管塌陷" />氣管塌陷</label>
          <label><input class="mh" type="checkbox" value="關節問題" />關節問題</label>
          <label><input id="otherInjury" type="checkbox" value="其他應注意事項" />其他應注意事項</label>
        </div>
      </div>

      <div id="otherInjuryWrap" class="field otherInputWrap" style="display:none;">
        <label for="otherInjuryText">其他病史／應注意事項</label>
        <input id="otherInjuryText" type="text" />
      </div>

      <div class="grid grid-2" style="margin-top:14px;">
        <div class="bodyCheckItem">
          <strong>眼睛</strong>
          <div class="radioRow">
            <label><input type="radio" name="body_eyes" value="正常" checked />正常</label>
            <label><input type="radio" name="body_eyes" value="異常" />異常</label>
          </div>
          <div class="bodyCheckDetail">
            <input id="bodyDetail_eyes" type="text" placeholder="請填寫異常說明" />
          </div>
        </div>

        <div class="bodyCheckItem">
          <strong>牙齒</strong>
          <div class="radioRow">
            <label><input type="radio" name="body_teeth" value="正常" checked />正常</label>
            <label><input type="radio" name="body_teeth" value="異常" />異常</label>
          </div>
          <div class="bodyCheckDetail">
            <input id="bodyDetail_teeth" type="text" placeholder="請填寫異常說明" />
          </div>
        </div>

        <div class="bodyCheckItem">
          <strong>耳朵</strong>
          <div class="radioRow">
            <label><input type="radio" name="body_ears" value="正常" checked />正常</label>
            <label><input type="radio" name="body_ears" value="異常" />異常</label>
          </div>
          <div class="bodyCheckDetail">
            <input id="bodyDetail_ears" type="text" placeholder="請填寫異常說明" />
          </div>
        </div>

        <div class="bodyCheckItem">
          <strong>四肢</strong>
          <div class="radioRow">
            <label><input type="radio" name="body_limbs" value="正常" checked />正常</label>
            <label><input type="radio" name="body_limbs" value="異常" />異常</label>
          </div>
          <div class="bodyCheckDetail">
            <input id="bodyDetail_limbs" type="text" placeholder="請填寫異常說明" />
          </div>
        </div>

        <div class="bodyCheckItem">
          <strong>皮膚</strong>
          <div class="radioRow">
            <label><input type="radio" name="body_skin" value="正常" checked />正常</label>
            <label><input type="radio" name="body_skin" value="異常" />異常</label>
          </div>
          <div class="bodyCheckDetail">
            <input id="bodyDetail_skin" type="text" placeholder="請填寫異常說明" />
          </div>
        </div>

        <div class="bodyCheckItem">
          <strong>皮毛</strong>
          <div class="radioRow">
            <label><input type="radio" name="body_coat" value="正常" checked />正常</label>
            <label><input type="radio" name="body_coat" value="異常" />異常</label>
          </div>
          <div class="bodyCheckDetail">
            <input id="bodyDetail_coat" type="text" placeholder="請填寫異常說明" />
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="sectionTitle">緊急就醫資訊</div>

      <div class="field">
        <label>就醫方式</label>
        <div class="radioRow">
          <label><input type="radio" name="vetMode" value="甲方指定" checked />甲方指定</label>
          <label><input type="radio" name="vetMode" value="乙方指定" />乙方指定</label>
        </div>
      </div>

      <div class="grid grid-3" style="margin-top:14px;">
        <div class="field">
          <label for="vetName">動物醫院名稱</label>
          <input id="vetName" type="text" />
        </div>
        <div class="field">
          <label for="vetPhone">動物醫院電話</label>
          <input id="vetPhone" type="text" />
        </div>
        <div class="field">
          <label for="vetAddress">動物醫院地址</label>
          <input id="vetAddress" type="text" />
        </div>
      </div>
    </div>

    <div class="card">
      <div class="sectionTitle">服務項目</div>

      <div class="field">
        <label>洗澡服務</label>
        <div class="checkRow">
          <label><input type="checkbox" class="svcWash svcAmountToggle" value="基礎洗澡" data-amount-target="amt_wash_basic" />基礎洗澡</label>
          <label><input type="checkbox" class="svcWash svcAmountToggle" value="精緻洗澡" data-amount-target="amt_wash_deluxe" />精緻洗澡</label>
          <label><input type="checkbox" id="svcWashOther" class="svcWash" value="其他" />其他</label>
        </div>

        <div id="amt_wash_basic" class="amountWrap">
          <input type="text" class="js-currency" placeholder="基礎洗澡金額" />
        </div>
        <div id="amt_wash_deluxe" class="amountWrap">
          <input type="text" class="js-currency" placeholder="精緻洗澡金額" />
        </div>

        <div id="svcWashOtherWrap" class="otherInputWrap">
          <input id="svcWashOtherText" type="text" placeholder="其他洗澡服務內容" style="margin-bottom:8px;" />
          <input id="svcWashOtherAmount" class="js-currency" type="text" placeholder="其他洗澡服務金額" />
        </div>
      </div>

      <div class="field" style="margin-top:16px;">
        <label>大美容（含洗澡）</label>
        <div class="checkRow">
          <label><input type="checkbox" class="svcGroom svcAmountToggle" value="小美容" data-amount-target="amt_groom_small" />小美容</label>
          <label><input type="checkbox" class="svcGroom svcAmountToggle" value="大美容" data-amount-target="amt_groom_full" />大美容</label>
        </div>

        <div id="amt_groom_small" class="amountWrap">
          <input type="text" class="js-currency" placeholder="小美容金額" />
        </div>
        <div id="amt_groom_full" class="amountWrap">
          <input type="text" class="js-currency" placeholder="大美容金額" />
        </div>
      </div>

      <div class="field" style="margin-top:16px;">
        <label>SPA</label>
        <div class="checkRow">
          <label><input type="checkbox" class="svcSpa svcAmountToggle" value="草本泥SPA" data-amount-target="amt_spa_1" />草本泥SPA</label>
          <label><input type="checkbox" class="svcSpa svcAmountToggle" value="奈米浴" data-amount-target="amt_spa_2" />奈米浴</label>
        </div>

        <div id="amt_spa_1" class="amountWrap">
          <input type="text" class="js-currency" placeholder="草本泥SPA金額" />
        </div>
        <div id="amt_spa_2" class="amountWrap">
          <input type="text" class="js-currency" placeholder="奈米浴金額" />
        </div>
      </div>

      <div class="field" style="margin-top:16px;">
        <label>單次項目</label>
        <div class="checkRow">
          <label><input type="checkbox" class="svcSingle svcAmountToggle" value="剪指甲" data-amount-target="amt_single_1" />剪指甲</label>
          <label><input type="checkbox" class="svcSingle svcAmountToggle" value="清耳朵" data-amount-target="amt_single_2" />清耳朵</label>
          <label><input type="checkbox" class="svcSingle svcAmountToggle" value="擠肛門腺" data-amount-target="amt_single_3" />擠肛門腺</label>
        </div>

        <div id="amt_single_1" class="amountWrap">
          <input type="text" class="js-currency" placeholder="剪指甲金額" />
        </div>
        <div id="amt_single_2" class="amountWrap">
          <input type="text" class="js-currency" placeholder="清耳朵金額" />
        </div>
        <div id="amt_single_3" class="amountWrap">
          <input type="text" class="js-currency" placeholder="擠肛門腺金額" />
        </div>
      </div>

      <div class="field" style="margin-top:16px;">
        <label>住宿</label>
        <div class="grid grid-3">
          <div>
            <input id="stayCheckin" class="js-date" type="text" placeholder="入住日期 YYYY/MM/DD" />
          </div>
          <div>
            <input id="stayCheckout" class="js-date" type="text" placeholder="退宿日期 YYYY/MM/DD" />
          </div>
          <div>
            <input id="stayAmount" class="js-currency" type="text" placeholder="住宿金額" />
          </div>
        </div>

        <div class="checkRow" style="margin-top:12px;">
          <label><input type="checkbox" class="svcStayItem" value="飼料" />飼料</label>
          <label><input type="checkbox" class="svcStayItem" value="尿布" />尿布</label>
          <label><input type="checkbox" class="svcStayItem" value="玩具" />玩具</label>
          <label><input type="checkbox" id="svcStayOther" class="svcStayItem" value="其他" />其他</label>
        </div>

        <div id="svcStayOtherWrap" class="otherInputWrap">
          <input id="svcStayOtherText" type="text" placeholder="其他住宿用品" />
        </div>
      </div>

      <div class="field" style="margin-top:16px;">
        <label for="serviceOtherNote">其他服務</label>
        <input id="serviceOtherNote" type="text" placeholder="請填寫其他服務內容" />
        <div style="margin-top:8px;">
          <input id="serviceOtherAmount" class="js-currency" type="text" placeholder="其他服務金額" />
        </div>
      </div>
    </div>

    <div class="card">
      <div class="sectionTitle">付款資訊</div>

      <div class="field">
        <label>付款方式</label>
        <div class="checkRow">
          <label><input type="checkbox" class="payMethod" value="現金" data-target="payCashWrap" />現金</label>
          <label><input type="checkbox" class="payMethod" value="轉帳" data-target="payTransferWrap" />轉帳</label>
          <label><input type="checkbox" class="payMethod" value="電子支付" data-target="payEpayWrap" />電子支付</label>
        </div>
      </div>

      <div id="payCashWrap" class="amountWrap">
        <input id="payAmountCash" class="js-currency" type="text" placeholder="現金金額" />
      </div>

      <div id="payTransferWrap" class="amountWrap">
        <input id="payAmountTransfer" class="js-currency" type="text" placeholder="轉帳金額" />
      </div>

      <div id="payEpayWrap" class="amountWrap">
        <input id="payAmountEpay" class="js-currency" type="text" placeholder="電子支付金額" />
      </div>

      <div class="grid grid-2" style="margin-top:14px;">
        <div class="field">
          <label for="payDate">付款日期</label>
          <input id="payDate" class="js-date" type="text" placeholder="YYYY/MM/DD" />
        </div>
        <div class="field">
          <label>付款總金額</label>
          <input id="payTotalText" type="text" value="$0" readonly />
        </div>
      </div>
    </div>

    <div class="card">
      <div class="sectionTitle">契約內容</div>
      <div id="contractText">
甲方已詳細閱讀並同意本契約內容。
乙方提供之美容、洗澡、住宿等服務，將依現場狀況及毛孩身體狀態進行評估。
如遇突發狀況，乙方得依甲方指定或乙方指定之動物醫院送醫處理。
      </div>

      <div class="grid grid-2" style="margin-top:14px;">
        <div class="field">
          <label for="signDate">簽署日期</label>
          <input id="signDate" class="js-date" type="text" />
        </div>
      </div>

      <div class="agreeRow">
        <input id="agree" type="checkbox" />
        <label for="agree">我已閱讀並同意契約內容</label>
      </div>
    </div>

    <div class="card">
      <div class="sectionTitle">甲方簽名</div>

      <div class="sigWrap">
        <canvas id="sig"></canvas>
        <div class="sigTools">
          <button type="button" id="clear" class="btnGhost">清除簽名</button>
        </div>
      </div>

      <button type="button" id="submit" class="btn" onclick="handleSubmit()">送出簽名</button>
      <div id="msg"></div>
    </div>
  </div>

  <script>
    const LIFF_ID = "2009333840-1wawyJgg";
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxdS0rdSl-Lcbco_fpIh1mBcxEePZORTYAITf12DyidwaNhcbDvR7NhoYXrf4EtM7Ngrg/exec";
    const SHARED_SECRET = "kumajima2025";

    const STORE_VET = {
      name: "愛心動物醫院",
      phone: "07-7156399",
      address: "高雄市苓雅區建國一路74-3號"
    };

    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function getRadio(name) {
      return document.querySelector(`input[name="${name}"]:checked`)?.value || "";
    }

    function getCheckedValues(selectorOrElements) {
      const list = Array.isArray(selectorOrElements)
        ? selectorOrElements
        : Array.from(document.querySelectorAll(selectorOrElements));
      return list.filter(el => el.checked).map(el => el.value);
    }

    function getPetTemperament() {
      return Array.from(document.querySelectorAll(".pt"))
        .filter(el => el.checked)
        .map(el => el.value);
    }

    function getServiceDetailList(list) {
      return list
        .filter(el => el.checked)
        .map(el => {
          const wrap = document.getElementById(el.dataset.amountTarget || "");
          const amountInput = wrap ? wrap.querySelector("input") : null;
          return {
            item: el.value,
            amount: amountInput ? (amountInput.value || "").trim() : ""
          };
        });
    }

    function getStayItemDetailList() {
      return Array.from(document.querySelectorAll(".svcStayItem"))
        .filter(el => el.checked)
        .map(el => ({
          item: el.value,
          amount: ""
        }));
    }

    function getMedicalHistory() {
      const arr = [];
      const mhNone = document.getElementById("mh_none");
      const otherInjury = document.getElementById("otherInjury");

      if (mhNone && mhNone.checked) arr.push(mhNone.value);

      document.querySelectorAll(".mh").forEach(el => {
        if (el.checked) arr.push(el.value);
      });

      if (otherInjury && otherInjury.checked && !arr.includes(otherInjury.value)) {
        arr.push(otherInjury.value);
      }

      return arr;
    }

    function getBodyChecks() {
      const items = [
        { label: "眼睛", key: "body_eyes", detailId: "bodyDetail_eyes" },
        { label: "牙齒", key: "body_teeth", detailId: "bodyDetail_teeth" },
        { label: "耳朵", key: "body_ears", detailId: "bodyDetail_ears" },
        { label: "四肢", key: "body_limbs", detailId: "bodyDetail_limbs" },
        { label: "皮膚", key: "body_skin", detailId: "bodyDetail_skin" },
        { label: "皮毛", key: "body_coat", detailId: "bodyDetail_coat" }
      ];

      return items.map(item => {
        const detailEl = document.getElementById(item.detailId);
        return {
          part: item.label,
          status: getRadio(item.key) || "正常",
          detail: detailEl ? (detailEl.value || "").trim() : ""
        };
      });
    }

    function getPaymentDetailList() {
      const arr = [];
      const payMethodBoxes = Array.from(document.querySelectorAll(".payMethod"));

      payMethodBoxes.forEach(box => {
        if (!box.checked) return;

        let amount = "";
        const targetId = box.dataset.target;
        const wrap = document.getElementById(targetId || "");
        const input = wrap ? wrap.querySelector("input") : null;
        if (input) amount = (input.value || "").trim();

        arr.push({
          method: box.value,
          amount
        });
      });

      return arr;
    }

    function formatServiceText(details) {
      if (!details || !details.length) return "（未勾選）";
      return details
        .map(item => item.amount ? `${item.item}（${item.amount}）` : item.item)
        .join("、");
    }

    function parseCurrency(v) {
      const digits = String(v || "").replace(/\D/g, "");
      return digits ? Number(digits) : 0;
    }

    function formatCurrency(v) {
      const digits = String(v || "").replace(/\D/g, "");
      if (!digits) return "";
      return "$" + Number(digits).toLocaleString("zh-TW");
    }

    function formatCurrencyNumber(n) {
      return "$" + Number(n || 0).toLocaleString("zh-TW");
    }

    function formatYMD(value) {
      const digits = String(value || "").replace(/\D/g, "").slice(0, 8);
      if (!digits) return "";

      const y = digits.slice(0, 4);
      const m = digits.slice(4, 6);
      const d = digits.slice(6, 8);

      let out = y;
      if (digits.length > 4) out += "/" + m;
      if (digits.length > 6) out += "/" + d;
      return out;
    }

    function todayZh() {
      const d = new Date();
      return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
    }

    function todayYMD() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      return `${y}/${m}/${dd}`;
    }

    async function initLIFF() {
      try {
        if (!window.liff) throw new Error("LIFF SDK 載入失敗");
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return false;
        }

        return true;
      } catch (e) {
        console.error(e);
        throw new Error("LINE 初始化失敗，請重新開啟表單");
      }
    }

    window.handleSubmit = async function () {
      const canvas = document.getElementById("sig");
      const submitBtn = document.getElementById("submit");
      const msg = document.getElementById("msg");
      const agree = document.getElementById("agree");

      const ownerName = document.getElementById("ownerName");
      const ownerIdNo = document.getElementById("ownerIdNo");
      const ownerPhone = document.getElementById("ownerPhone");
      const ownerEmail = document.getElementById("ownerEmail");
      const ownerAddress = document.getElementById("ownerAddress");
      const emergencyName = document.getElementById("emergencyName");
      const emergencyPhone = document.getElementById("emergencyPhone");
      const ownerRelation = document.getElementById("ownerRelation");

      const petName = document.getElementById("petName");
      const petBreed = document.getElementById("petBreed");
      const petAge = document.getElementById("petAge");
      const petBirthday = document.getElementById("petBirthday");
      const petWeight = document.getElementById("petWeight");
      const signDate = document.getElementById("signDate");
      const chipNo = document.getElementById("chipNo");
      const petTemperamentNote = document.getElementById("petTemperamentNote");

      const otherInjury = document.getElementById("otherInjury");
      const otherText = document.getElementById("otherInjuryText");

      const vetName = document.getElementById("vetName");
      const vetPhone = document.getElementById("vetPhone");
      const vetAddress = document.getElementById("vetAddress");

      const svcWashOther = document.getElementById("svcWashOther");
      const svcWashOtherText = document.getElementById("svcWashOtherText");
      const svcWashOtherAmount = document.getElementById("svcWashOtherAmount");

      const svcStayOther = document.getElementById("svcStayOther");
      const svcStayOtherText = document.getElementById("svcStayOtherText");

      const stayCheckin = document.getElementById("stayCheckin");
      const stayCheckout = document.getElementById("stayCheckout");
      const stayAmount = document.getElementById("stayAmount");
      const serviceOtherNote = document.getElementById("serviceOtherNote");
      const serviceOtherAmount = document.getElementById("serviceOtherAmount");
      const payDate = document.getElementById("payDate");
      const payTotalText = document.getElementById("payTotalText");

      const svcWashBoxes = Array.from(document.querySelectorAll(".svcWash"));
      const svcGroomBoxes = Array.from(document.querySelectorAll(".svcGroom"));
      const svcSpaBoxes = Array.from(document.querySelectorAll(".svcSpa"));
      const svcSingleBoxes = Array.from(document.querySelectorAll(".svcSingle"));
      const payMethodBoxes = Array.from(document.querySelectorAll(".payMethod"));

      function setError(t) {
        if (msg) {
          msg.textContent = t || "";
          msg.style.color = "#9E5E4A";
        }
      }

      function setOK(t) {
        if (msg) {
          msg.textContent = t || "";
          msg.style.color = "#3F342C";
        }
      }

      function resetSubmit() {
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.textContent = "送出簽名";
        }
      }

      function requireValue(inputEl, label) {
        if (!inputEl) {
          setError("系統缺少欄位：" + label);
          resetSubmit();
          return null;
        }
        const v = (inputEl.value || "").trim();
        if (!v) {
          setError("請填寫：" + label);
          inputEl.focus();
          resetSubmit();
          return null;
        }
        return v;
      }

      if (!canvas) {
        setError("找不到簽名區塊");
        return;
      }

      if (!agree || !agree.checked) {
        setError("請先勾選同意契約內容");
        return;
      }

      const signatureDataUrlCheck = canvas.toDataURL("image/png");
      if (!signatureDataUrlCheck || signatureDataUrlCheck.length < 3000) {
        setError("請先完成簽名");
        return;
      }

      if (submitBtn) {
        submitBtn.disabled = true;
        submitBtn.textContent = "資料送出中…請稍候...";
      }
      if (msg) msg.textContent = "";

      const isOwnerSelf = getRadio("isOwnerSelf") || "是";
      const chipHas = getRadio("chipHas") || "有";
      const neuterStatus = getRadio("neuterStatus") || "已絕育";
      const vetMode = getRadio("vetMode") || "甲方指定";

      const medicalHistory = getMedicalHistory();
      const otherInjuryNote = otherInjury && otherInjury.checked ? (otherText?.value || "").trim() : "";
      const bodyChecks = getBodyChecks();

      const serviceWash = getServiceDetailList(svcWashBoxes.filter(el => el.id !== "svcWashOther"));
      const serviceGroom = getServiceDetailList(svcGroomBoxes);
      const serviceSpa = getServiceDetailList(svcSpaBoxes);
      const serviceSingle = getServiceDetailList(svcSingleBoxes);
      const serviceStayItems = getStayItemDetailList().filter(item => item.item !== "其他");
      const paymentDetails = getPaymentDetailList();
      const payMethods = getCheckedValues(payMethodBoxes);

      const svcWashOtherDetail = svcWashOther && svcWashOther.checked ? {
        item: (svcWashOtherText?.value || "").trim() ? `其他：${(svcWashOtherText.value || "").trim()}` : "其他",
        amount: (svcWashOtherAmount?.value || "").trim()
      } : null;

      const svcStayOtherDetail = svcStayOther && svcStayOther.checked ? {
        item: (svcStayOtherText?.value || "").trim() ? `其他：${(svcStayOtherText.value || "").trim()}` : "其他",
        amount: ""
      } : null;

      const serviceOtherDetail = (serviceOtherNote?.value || "").trim() ? {
        item: (serviceOtherNote.value || "").trim(),
        amount: (serviceOtherAmount?.value || "").trim()
      } : null;

      const finalVetName = vetMode === "乙方指定" ? STORE_VET.name : (vetName?.value || "").trim();
      const finalVetPhone = vetMode === "乙方指定" ? STORE_VET.phone : (vetPhone?.value || "").trim();
      const finalVetAddress = vetMode === "乙方指定" ? STORE_VET.address : (vetAddress?.value || "").trim();

      const data = {
        ownerName: requireValue(ownerName, "甲方姓名"),
        ownerPhone: requireValue(ownerPhone, "聯絡電話"),
        ownerAddress: requireValue(ownerAddress, "通訊地址"),
        emergencyName: requireValue(emergencyName, "緊急聯絡人"),
        emergencyPhone: requireValue(emergencyPhone, "緊急聯絡人電話"),
        ownerEmail: requireValue(ownerEmail, "Email（寄送附本用）"),
        ownerIdNo: requireValue(ownerIdNo, "身分證字號"),

        isOwnerSelf,
        ownerRelation: isOwnerSelf === "否" ? requireValue(ownerRelation, "與飼主關係") : "",

        petName: requireValue(petName, "寵物姓名"),
        petBreed: requireValue(petBreed, "寵物品種"),
        petSex: getRadio("petSex") || "男生",
        petType: getRadio("petType") || "犬",
        petAge: requireValue(petAge, "寵物年齡"),
        petBirthday: requireValue(petBirthday, "寵物生日"),
        petWeight: requireValue(petWeight, "體重"),
        petTemperament: getPetTemperament(),
        petTemperamentNote: (petTemperamentNote?.value || "").trim(),

        chipHas,
        chipNo: chipHas === "有" ? (chipNo?.value || "").trim() : "",
        neuterStatus,

        medicalHistory,
        otherInjuryNote,
        bodyChecks,

        vetMode,
        vetName: vetMode === "乙方指定" ? finalVetName : requireValue(vetName, "動物醫院名稱"),
        vetPhone: vetMode === "乙方指定" ? finalVetPhone : requireValue(vetPhone, "動物醫院電話"),
        vetAddress: vetMode === "乙方指定" ? finalVetAddress : requireValue(vetAddress, "動物醫院地址"),

        signDate: requireValue(signDate, "簽署日期"),

        serviceWash,
        serviceWashOther: svcWashOtherDetail,
        serviceGroom,
        serviceSpa,
        serviceSingle,
        stayCheckin: (stayCheckin?.value || "").trim(),
        stayCheckout: (stayCheckout?.value || "").trim(),
        stayAmount: (stayAmount?.value || "").trim(),
        serviceStayItems,
        serviceStayOther: svcStayOtherDetail,
        serviceOther: serviceOtherDetail,

        payMethods,
        paymentDetails,
        payDate: (payDate?.value || "").trim(),
        payTotal: payTotalText ? (payTotalText.value || payTotalText.textContent || "$0") : "$0"
      };

      if (Object.values(data).some(v => v === null)) return;

      if (!isValidEmail(data.ownerEmail)) {
        setError("Email 格式不正確，請重新確認");
        ownerEmail.focus();
        resetSubmit();
        return;
      }

      if (data.payMethods.length === 0) {
        setError("請至少勾選一種支付方式");
        resetSubmit();
        return;
      }

      for (const item of data.paymentDetails) {
        if (!item.amount) {
          setError(`請填寫「${item.method}」金額`);
          resetSubmit();
          return;
        }
      }

      try {
        setOK("正在初始化 LINE...");
        const ok = await initLIFF();
        if (!ok) {
          resetSubmit();
          return;
        }

        let profile = null;
        try {
          profile = await liff.getProfile();
        } catch (e) {
          console.warn("getProfile failed:", e);
        }

        const contractTextValue = (document.getElementById("contractText")?.innerText || "").trim();
        const signatureDataUrl = canvas.toDataURL("image/png");

        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 20000);

        let gasRes;
        try {
          gasRes = await fetch(GOOGLE_SCRIPT_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=UTF-8" },
            body: JSON.stringify({
              secret: SHARED_SECRET,
              data,
              signatureDataUrl,
              line: {
                userId: profile?.userId || "",
                displayName: profile?.displayName || ""
              },
              contractText: contractTextValue
            }),
            signal: controller.signal
          });
        } finally {
          clearTimeout(timeoutId);
        }

        const gasText = await gasRes.text();
        let gasJson = null;

        try {
          gasJson = JSON.parse(gasText);
        } catch (e) {
          throw new Error("GAS 回傳格式錯誤：" + gasText);
        }

        if (!gasJson.ok) {
          throw new Error("GAS 錯誤：" + (gasJson.error || "未知錯誤"));
        }

        setOK("契約已完成簽署 ✔\n副本已寄送到您的 Email");

        submitBtn.textContent = "完成";
        submitBtn.disabled = true;

        setTimeout(() => {
          if (window.liff && liff.isInClient()) {
            liff.closeWindow();
          }
        }, 2000);

      } catch (err) {
        console.error(err);

        if (err.name === "AbortError") {
          setError("GAS 連線逾時，請檢查 Apps Script 是否已重新部署最新版本");
        } else {
          setError(err.message || "送出失敗");
        }

        resetSubmit();
      }
    };

    document.addEventListener("DOMContentLoaded", function () {
      const signDate = document.getElementById("signDate");
      const payDate = document.getElementById("payDate");
      const canvas = document.getElementById("sig");
      const clearBtn = document.getElementById("clear");
      const msg = document.getElementById("msg");

      if (signDate) signDate.value = todayZh();
      if (payDate) payDate.value = todayYMD();

      document.querySelectorAll(".js-date").forEach(el => {
        el.addEventListener("input", e => {
          e.target.value = formatYMD(e.target.value);
        });
      });

      const payAmountCash = document.getElementById("payAmountCash");
      const payAmountTransfer = document.getElementById("payAmountTransfer");
      const payAmountEpay = document.getElementById("payAmountEpay");
      const payTotalText = document.getElementById("payTotalText");

      function updatePayTotal() {
        const total =
          parseCurrency(payAmountCash?.value) +
          parseCurrency(payAmountTransfer?.value) +
          parseCurrency(payAmountEpay?.value);

        if (payTotalText) {
          payTotalText.value = formatCurrencyNumber(total);
        }
      }

      document.querySelectorAll(".js-currency").forEach(el => {
        el.addEventListener("input", e => {
          e.target.value = formatCurrency(e.target.value);
          updatePayTotal();
        });
      });

      const ownerRelationWrap = document.getElementById("ownerRelationWrap");
      const ownerRelation = document.getElementById("ownerRelation");
      function refreshOwnerRelation() {
        const notSelf = getRadio("isOwnerSelf") === "否";
        if (ownerRelationWrap) ownerRelationWrap.classList.toggle("hidden", !notSelf);
        if (!notSelf && ownerRelation) ownerRelation.value = "";
      }
      document.querySelectorAll('input[name="isOwnerSelf"]').forEach(r => {
        r.addEventListener("change", refreshOwnerRelation);
      });
      refreshOwnerRelation();

      const chipNoWrap = document.getElementById("chipNoWrap");
      const chipNo = document.getElementById("chipNo");
      function refreshChipWrap() {
        const show = getRadio("chipHas") === "有";
        if (chipNoWrap) chipNoWrap.classList.toggle("hidden", !show);
        if (!show && chipNo) chipNo.value = "";
      }
      document.querySelectorAll('input[name="chipHas"]').forEach(r => {
        r.addEventListener("change", refreshChipWrap);
      });
      refreshChipWrap();

      const vetName = document.getElementById("vetName");
      const vetPhone = document.getElementById("vetPhone");
      const vetAddress = document.getElementById("vetAddress");

      function refreshVetMode() {
        const mode = getRadio("vetMode");
        if (mode === "乙方指定") {
          if (vetName) vetName.value = STORE_VET.name;
          if (vetPhone) vetPhone.value = STORE_VET.phone;
          if (vetAddress) vetAddress.value = STORE_VET.address;
        } else {
          if (vetName) vetName.value = "";
          if (vetPhone) vetPhone.value = "";
          if (vetAddress) vetAddress.value = "";
        }
      }
      document.querySelectorAll('input[name="vetMode"]').forEach(r => {
        r.addEventListener("change", refreshVetMode);
      });

      const otherInjury = document.getElementById("otherInjury");
      const otherWrap = document.getElementById("otherInjuryWrap");
      const otherText = document.getElementById("otherInjuryText");
      const mhNone = document.getElementById("mh_none");
      const mhBoxes = Array.from(document.querySelectorAll(".mh"));

      function refreshOtherInjury() {
        const show = !!otherInjury?.checked;
        if (otherWrap) otherWrap.style.display = show ? "block" : "none";
        if (!show && otherText) otherText.value = "";
      }

      function enforceMedicalExclusive() {
        if (!mhNone) return;

        if (mhNone.checked) {
          mhBoxes.forEach(b => {
            if (b !== mhNone) b.checked = false;
          });
          if (otherInjury) otherInjury.checked = false;
          refreshOtherInjury();
        } else {
          const anyOther = mhBoxes.some(b => b.checked) || !!otherInjury?.checked;
          if (anyOther) mhNone.checked = false;
        }
      }

      if (otherInjury) otherInjury.addEventListener("change", () => {
        refreshOtherInjury();
        enforceMedicalExclusive();
      });
      if (mhNone) mhNone.addEventListener("change", enforceMedicalExclusive);
      mhBoxes.forEach(b => b.addEventListener("change", enforceMedicalExclusive));
      refreshOtherInjury();

      const svcWashOther = document.getElementById("svcWashOther");
      const svcWashOtherWrap = document.getElementById("svcWashOtherWrap");
      const svcWashOtherText = document.getElementById("svcWashOtherText");
      const svcWashOtherAmount = document.getElementById("svcWashOtherAmount");

      function refreshSvcWashOther() {
        const show = !!svcWashOther?.checked;
        if (svcWashOtherWrap) svcWashOtherWrap.style.display = show ? "block" : "none";
        if (!show) {
          if (svcWashOtherText) svcWashOtherText.value = "";
          if (svcWashOtherAmount) svcWashOtherAmount.value = "";
        }
      }
      if (svcWashOther) svcWashOther.addEventListener("change", refreshSvcWashOther);
      refreshSvcWashOther();

      const svcStayOther = document.getElementById("svcStayOther");
      const svcStayOtherWrap = document.getElementById("svcStayOtherWrap");
      const svcStayOtherText = document.getElementById("svcStayOtherText");

      function refreshSvcStayOther() {
        const show = !!svcStayOther?.checked;
        if (svcStayOtherWrap) svcStayOtherWrap.style.display = show ? "block" : "none";
        if (!show && svcStayOtherText) svcStayOtherText.value = "";
      }
      if (svcStayOther) svcStayOther.addEventListener("change", refreshSvcStayOther);
      refreshSvcStayOther();

      document.querySelectorAll(".svcAmountToggle").forEach(box => {
        const targetId = box.dataset.amountTarget;
        const wrap = document.getElementById(targetId || "");
        if (wrap) wrap.style.display = box.checked ? "block" : "none";

        box.addEventListener("change", () => {
          const targetId2 = box.dataset.amountTarget;
          if (!targetId2) return;

          const wrap2 = document.getElementById(targetId2);
          if (!wrap2) return;

          wrap2.style.display = box.checked ? "block" : "none";
          if (!box.checked) {
            const input = wrap2.querySelector("input");
            if (input) input.value = "";
          }
        });
      });

      const payMethodBoxes = Array.from(document.querySelectorAll(".payMethod"));
      payMethodBoxes.forEach(box => {
        const targetId = box.dataset.target;
        const wrap = document.getElementById(targetId || "");
        if (wrap) wrap.style.display = box.checked ? "block" : "none";

        box.addEventListener("change", () => {
          const targetId2 = box.dataset.target;
          const wrap2 = document.getElementById(targetId2);
          if (!wrap2) return;

          wrap2.style.display = box.checked ? "block" : "none";
          if (!box.checked) {
            const input = wrap2.querySelector("input");
            if (input) input.value = "";
          }
          updatePayTotal();
        });
      });

      document.querySelectorAll(".bodyCheckItem").forEach(item => {
        const radios = item.querySelectorAll('input[type="radio"]');
        const detailWrap = item.querySelector(".bodyCheckDetail");
        const detailInput = detailWrap ? detailWrap.querySelector("input") : null;

        function refresh() {
          const checked = Array.from(radios).find(r => r.checked);
          const show = checked && checked.value === "異常";
          if (detailWrap) detailWrap.style.display = show ? "block" : "none";
          if (!show && detailInput) detailInput.value = "";
        }

        radios.forEach(r => r.addEventListener("change", refresh));
        refresh();
      });

      if (canvas) {
        const ctx = canvas.getContext("2d");
        let drawing = false;

        function syncSize() {
          const r = canvas.getBoundingClientRect();
          const dpr = window.devicePixelRatio || 1;

          canvas.width = Math.round(r.width * dpr);
          canvas.height = Math.round(r.height * dpr);

          ctx.setTransform(1, 0, 0, 1, 0, 0);
          ctx.scale(dpr, dpr);
          ctx.lineWidth = 3;
          ctx.lineCap = "round";
          ctx.lineJoin = "round";
          ctx.strokeStyle = "#3F342C";
          ctx.fillStyle = "#FFFFFF";
          ctx.fillRect(0, 0, r.width, r.height);
        }

        function point(e) {
          const r = canvas.getBoundingClientRect();
          return { x: e.clientX - r.left, y: e.clientY - r.top };
        }

        function down(e) {
          e.preventDefault();
          drawing = true;
          const p = point(e);
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          if (msg) msg.textContent = "";
        }

        function move(e) {
          if (!drawing) return;
          e.preventDefault();
          const p = point(e);
          ctx.lineTo(p.x, p.y);
          ctx.stroke();
        }

        function up() {
          drawing = false;
        }

        syncSize();
        window.addEventListener("resize", syncSize);
        canvas.addEventListener("pointerdown", down, { passive: false });
        canvas.addEventListener("pointermove", move, { passive: false });
        window.addEventListener("pointerup", up);
        window.addEventListener("pointercancel", up);

        if (clearBtn) {
          clearBtn.addEventListener("click", () => {
            const r = canvas.getBoundingClientRect();
            ctx.clearRect(0, 0, r.width, r.height);
            ctx.fillStyle = "#FFFFFF";
            ctx.fillRect(0, 0, r.width, r.height);
            if (msg) {
              msg.textContent = "已清除，請重新簽名";
              msg.style.color = "#9E5E4A";
            }
          });
        }
      }

      updatePayTotal();
    });
  </script>
</body>
</html>
